name: Trigger Community Edition to Enterprise Merge
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - release/**


jobs:
  check-conditions:
    # run this only on PR events in CE repo
    if: ${{ github.repository == 'hashicorp/consul' }}
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.active.outputs.active }}
    env:
      BRANCH: release/1.22.3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Fetch active releases
        id: active
        run: |
          echo "BRANCH value: $BRANCH"
          echo "github.base_ref: ${{ github.base_ref }}"
          
          if [[ "$BRANCH" == "main" ]]; then
            echo "Branch is main, setting IS_ACTIVE=1"
            IS_ACTIVE=1
          else
            IS_ACTIVE=1
            if [[ -f ./.release/versions.hcl ]]; then
              ACTIVE=$(awk '/version "[0-9]+\.[0-9]+"/{ver=$2} /ce_active = true/{print ver}' ./.release/versions.hcl | tr -d '"')
              echo "Active versions: $ACTIVE"
              IS_ACTIVE=0
              for v in $ACTIVE; do
                echo "Checking if $BRANCH starts with release/$v"
                if [[ "$BRANCH" == "release/$v"* ]]; then 
                  echo "Match found! Setting IS_ACTIVE=1"
                  IS_ACTIVE=1
                fi
              done
            else
              echo ".release/versions.hcl not found, defaulting active=1"
            fi
          fi
          echo "Final IS_ACTIVE value: $IS_ACTIVE"
          echo "active=$IS_ACTIVE" >> $GITHUB_OUTPUT

  trigger-ce-merge:
    needs: check-conditions
    if: needs.check-conditions.outputs.active == '1'
    runs-on: ubuntu-latest
    steps:
      - name: Get Latest Commit
        id: commit
        run: |
          # Use the head SHA (latest commit on the PR branch)
          COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
          
          echo "Commit SHA: $COMMIT_SHA"
          
          if [[ -z "$COMMIT_SHA" || "$COMMIT_SHA" == "null" ]]; then
            echo "❌ Failed to get commit SHA"
            exit 1
          fi
          
          echo "sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
      - name: Get Approving Reviewers
        id: reviewers
        env:
          GH_PAT: ${{ secrets.ELEVATED_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          reviewers=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews" | \
            jq -c '[.[] | select(.state=="APPROVED") | .user.login] | unique' 2>/dev/null) || reviewers="[]"
          
          # Ensure we have a valid JSON array
          if [[ -z "$reviewers" || "$reviewers" == "null" ]]; then
            reviewers="[]"
          fi
          
          echo "approved_reviewers=$reviewers" >> $GITHUB_OUTPUT
          echo "Approved reviewers: $reviewers"
      - name: Trigger Merge
        env:
          GIT_REF: release/1.22.3
          GIT_SHA: ${{ steps.commit.outputs.sha }}
          GH_PAT: ${{ secrets.ELEVATED_GITHUB_TOKEN }}
          GIT_ACTOR: ${{ github.actor }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_APPROVERS: ${{ steps.reviewers.outputs.approved_reviewers || '[]' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Ensure PR_APPROVERS is a valid JSON array
          if [[ -z "$PR_APPROVERS" || "$PR_APPROVERS" == "null" ]]; then
            PR_APPROVERS="[]"
          fi
          
          # Create the JSON payload using jq for safe escaping
          payload=$(jq -n \
            --arg event_type "oss-merge" \
            --arg git_ref "$GIT_REF" \
            --arg git_sha "$GIT_SHA" \
            --arg git_actor "$GIT_ACTOR" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_body "$PR_BODY" \
            --argjson pr_approvers "$PR_APPROVERS" \
            --arg pr_number "$PR_NUMBER" \
            '{
              event_type: $event_type,
              client_payload: {
                "git-ref": $git_ref,
                "git-sha": $git_sha,
                "git-actor": $git_actor,
                "title": $pr_title,
                "description": $pr_body,
                "pr_approvers": $pr_approvers,
                "pr_number": $pr_number
              }
            }'
          )
          curl -v -X POST \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "https://api.github.com/repos/hashicorp/consul-enterprise/dispatches"