name: frontend

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'ui/**'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      compute-small: ${{ steps.setup-outputs.outputs.compute-small }}
      compute-medium: ${{ steps.setup-outputs.outputs.compute-medium }}
      compute-large: ${{ steps.setup-outputs.outputs.compute-large }}
      compute-xl: ${{ steps.setup-outputs.outputs.compute-xl }}
      has-consul-license: ${{ steps.check-consul-license.outputs.has-consul-license }}
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
      - id: setup-outputs
        name: Setup outputs
        run: ./.github/scripts/get_runner_classes.sh
      - id: check-consul-license
        name: Check Consul license availability
        env:
          CONSUL_LICENSE: ${{ secrets.CONSUL_LICENSE }}
        run: |
          if [ -n "$CONSUL_LICENSE" ]; then
            echo "has-consul-license=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-consul-license=false" >> "$GITHUB_OUTPUT"
          fi

  workspace-tests:
    needs: setup
    runs-on: ${{ fromJSON(needs.setup.outputs.compute-small) }}
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4

      - name: Install PNPM
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false
          package_json_file: ui/package.json

      - name: Setup node and pnpm cache
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version-file: "./ui/package.json"
          cache: "pnpm"
          cache-dependency-path: "ui/pnpm-lock.yaml"

      # Install dependencies.
      - name: install packages
        working-directory: ui
        run: make deps

      - run: make test-workspace

  node-tests:
    needs: setup
    runs-on: ${{ fromJSON(needs.setup.outputs.compute-small) }}
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4

      - name: Install PNPM
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false
          package_json_file: ui/package.json
      
      - name: Setup node and pnpm cache
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version-file: "./ui/package.json"
          cache: "pnpm"
          cache-dependency-path: "ui/pnpm-lock.yaml"

      # Install dependencies.
      - name: install packages
        working-directory: ui
        run: make deps

      - run: make test-node
        working-directory: ui/packages/consul-ui

  ember-build-test:
    needs: setup
    if: ${{ !endsWith(github.repository, '-enterprise') }}
    runs-on: ${{ fromJSON(needs.setup.outputs.compute-large ) }}
    strategy:
      matrix:
        partition: [1, 2, 3, 4]
    env:
      EMBER_TEST_REPORT: test-results/report-ce.xml # outputs test report for CI test summary
      EMBER_TEST_PARALLEL: true # enables test parallelization with ember-exam
      CONSUL_NSPACES_ENABLED: 0 # NOTE: this should be 1 in ENT.
      JOBS: 2 # limit parallelism for broccoli-babel-transpiler
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4

      - name: Install PNPM
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false
          package_json_file: ui/package.json

      - name: Setup node and pnpm cache
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version-file: "./ui/package.json"
          cache: "pnpm"
          cache-dependency-path: "ui/pnpm-lock.yaml"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@82b9ce628cc5595478a9ebadc480958a36457dc2 # v1.6.0

      - name: Install dependencies
        working-directory: ui
        run: make deps

      - name: Build CI
        working-directory: ui/packages/consul-ui
        run: make build-ci

      - name: Ember exam
        working-directory: ui/packages/consul-ui
        run: node_modules/.bin/ember exam --split=4 --partition=${{ matrix.partition }} --path dist --silent -r xunit

      - name: Test Coverage CI
        working-directory: ui/packages/consul-ui
        run: make test-coverage-ci

  ember-build-test-ent:
    needs: setup
    runs-on: ${{ fromJSON(needs.setup.outputs.compute-large ) }}
    strategy:
      matrix:
        partition: [1, 2, 3, 4]
    env:
      EMBER_TEST_REPORT: test-results/report-ce.xml # outputs test report for CI test summary
      EMBER_TEST_PARALLEL: true # enables test parallelization with ember-exam
      CONSUL_NSPACES_ENABLED: 1 # NOTE: this should be 1 in ENT.
      JOBS: 2 # limit parallelism for broccoli-babel-transpiler
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4

      - name: Install PNPM
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false
          package_json_file: ui/package.json

      - name: Setup node and pnpm cache
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version-file: "./ui/package.json"
          cache: "pnpm"
          cache-dependency-path: "ui/pnpm-lock.yaml"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@82b9ce628cc5595478a9ebadc480958a36457dc2 # v1.6.0

      - name: Install dependencies
        working-directory: ui
        run: make deps

      - name: Build CI
        working-directory: ui/packages/consul-ui
        run: make build-ci

      - name: Ember exam
        working-directory: ui/packages/consul-ui
        run: node_modules/.bin/ember exam --split=4 --partition=${{ matrix.partition }} --path dist --silent -r xunit

      - name: Test Coverage CI
        working-directory: ui/packages/consul-ui
        run: make test-coverage-ci

  e2e-tests:
    needs: setup
    if: ${{ !endsWith(github.repository, '-enterprise') }}
    runs-on: ${{ fromJSON(needs.setup.outputs.compute-medium) }}
    continue-on-error: false
    env:
      CONSUL_NSPACES_ENABLED: 0
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4

      - name: Install PNPM
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false
          package_json_file: ui/package.json

      - name: Setup node and pnpm cache
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version-file: "./ui/package.json"
          cache: "pnpm"
          cache-dependency-path: "ui/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: ui
        run: make deps

      - name: Install Playwright browsers
        working-directory: ui/packages/consul-ui
        run: npx playwright install --with-deps chromium

      - name: Checkout consul-ui-testing repo
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
        with:
          repository: hashicorp/consul-ui-testing
          path: consul-ui-testing
          token: ${{ secrets.ELEVATED_GITHUB_TOKEN }}

      - name: Install consul-ui-testing dependencies
        working-directory: consul-ui-testing
        run: yarn install

      - name: Install httpie (required by consul-ui-testing)
        run: |
          sudo apt-get update
          sudo apt-get install -y httpie

      - name: Patch consul-ui-testing for CI runners
        working-directory: consul-ui-testing
        run: bash "$GITHUB_WORKSPACE/.github/scripts/patch_consul_ui_testing.sh"

      - name: Force HashiCups image rebuild
        working-directory: consul-ui-testing
        run: rm -f .last_consul_version_built

      - name: Start Consul API servers (CE)
        working-directory: consul-ui-testing
        timeout-minutes: 2
        run: |
          echo "Starting Consul API servers at $(date '+%Y-%m-%d %H:%M:%S')"
          yarn start hashicorppreview/consul:latest > consul-start.log 2>&1 &
          echo $! > consul-start.pid
          echo "consul-ui-testing start PID: $(cat consul-start.pid)"
          echo "Process table entry for startup command:"
          ps -fp "$(cat consul-start.pid)" || true
          sleep 10
          if ! kill -0 "$(cat consul-start.pid)" 2>/dev/null; then
            echo "::error::Consul startup process exited within the first 10 seconds"
            echo "--- consul-start.log ---"
            tail -n 200 consul-start.log || true
            echo "--- docker ps -a ---"
            docker ps -a || true
            exit 1
          fi
          echo "Startup process is still running after 10 seconds"
          echo "--- Initial consul-start.log (last 100 lines) ---"
          tail -n 100 consul-start.log || true
          echo "--- docker compose ps ---"
          docker compose ps || true
          echo "--- docker ps -a ---"
          docker ps -a || true

      - name: Wait for Consul peering setup (CE)
        working-directory: consul-ui-testing
        timeout-minutes: 6
        env:
          CONSUL_IMAGE: hashicorppreview/consul:latest
        run: |
          echo "Waiting up to 5 minutes for Consul peering setup..."
          last_log_line=0
          for i in $(seq 1 60); do
            current_log_line=$(wc -l < consul-start.log 2>/dev/null || echo 0)
            if [ "$current_log_line" -gt "$last_log_line" ]; then
              echo "--- New consul-start.log output (lines $((last_log_line + 1))-$current_log_line) ---"
              sed -n "$((last_log_line + 1)),$current_log_line p" consul-start.log || true
              last_log_line=$current_log_line
            fi

            if grep -q "We have successfully setup peering" consul-start.log 2>/dev/null; then
              echo "Consul peering is ready (after ~$((i * 5))s)"
              echo "--- docker compose ps at peering completion ---"
              docker compose ps || true
              exit 0
            fi

            if ! kill -0 "$(cat consul-start.pid)" 2>/dev/null; then
              echo "::error::Consul startup process exited before peering completed"
              echo "--- Last 300 lines of consul-start.log ---"
              tail -n 300 consul-start.log
              echo "--- docker compose ps ---"
              docker compose ps || true
              echo "--- docker ps -a ---"
              docker ps -a || true
              exit 1
            fi

            if (( i % 6 == 0 )); then
              echo "Still waiting... ($((i * 5))s elapsed)"
              echo "--- docker compose ps ---"
              docker compose ps || true
            fi
            sleep 5
          done

          echo "::error::Timed out waiting for Consul peering setup (300s)"
          echo "--- Last 300 lines of consul-start.log ---"
          tail -n 300 consul-start.log
          echo "--- docker compose ps ---"
          docker compose ps || true
          echo "--- docker ps -a ---"
          docker ps -a || true
          exit 1

      - name: Verify Consul API readiness (CE)
        working-directory: consul-ui-testing
        timeout-minutes: 3
        env:
          CONSUL_IMAGE: hashicorppreview/consul:latest
        run: |
          echo "Verifying Consul API readiness before starting UI..."
          echo "--- docker compose ps ---"
          docker compose ps || true

          for i in $(seq 1 12); do
            primary_leader=$(curl -fsS http://localhost:8500/v1/status/leader || true)
            secondary_leader=$(curl -fsS http://localhost:8501/v1/status/leader || true)

            if [ -n "$primary_leader" ] && [ -n "$secondary_leader" ] && [ "$primary_leader" != '""' ] && [ "$secondary_leader" != '""' ]; then
              echo "Primary leader: $primary_leader"
              echo "Secondary leader: $secondary_leader"
              exit 0
            fi

            echo "Consul APIs not ready yet ($((i * 5))s elapsed)"
            echo "Primary leader response: ${primary_leader:-<empty>}"
            echo "Secondary leader response: ${secondary_leader:-<empty>}"
            sleep 5
          done

          echo "::error::Consul HTTP APIs did not become ready in time"
          echo "--- docker compose ps ---"
          docker compose ps || true
          echo "--- Last 200 lines of consul-start.log ---"
          tail -n 200 consul-start.log || true
          exit 1

      - name: Report HashiCups container states (CE)
        working-directory: consul-ui-testing
        timeout-minutes: 2
        env:
          CONSUL_IMAGE: hashicorppreview/consul:latest
        run: |
          echo "Container states after Consul readiness:"
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'
          echo "Exited containers:"
          docker ps -a --filter status=exited --format '{{.Names}} {{.Status}}' || true
          for container in product-api public-api payments product-db product-api-secondary public-api-secondary payments-secondary product-db-secondary frontend frontend-secondary; do
            if docker ps -a --format '{{.Names}}' | grep -qx "$container"; then
              echo "--- Last 40 log lines for $container ---"
              docker logs --tail 40 "$container" || true
            fi
          done

      - name: Start Consul UI
        working-directory: ui/packages/consul-ui
        run: |
          pnpm run start:consul &
          echo $! > consul-ui.pid
        env:
          CONSUL_HTTP_ADDR: http://localhost:8500

      - name: Wait for UI to be ready
        timeout-minutes: 3
        run: |
          echo "Waiting for Consul UI on http://localhost:4200..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4200 > /dev/null 2>&1; then
              echo "Consul UI is ready (after ~$((i * 2))s)"
              exit 0
            fi
            echo "Waiting for UI... ($((i * 2))s elapsed)"
            sleep 2
          done
          echo "::error::Timed out waiting for Consul UI (60s)"
          exit 1

      - name: Run E2E health check
        working-directory: ui/packages/consul-ui
        timeout-minutes: 2
        run: pnpm run test:e2e:health

      - name: Run basic E2E tests (CE)
        working-directory: ui/packages/consul-ui
        timeout-minutes: 15
        run: pnpm run test:e2e:basic
        env:
          CI: true
          CONSUL_UI_TEST_TOKEN: ${{ secrets.CONSUL_UI_TEST_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: e2e-test-results-ce
          path: ui/packages/consul-ui/e2e-tests/reports/
          retention-days: 30

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: e2e-screenshots-ce
          path: ui/packages/consul-ui/e2e-tests/reports/test-results/
          retention-days: 7

  e2e-tests-ent:
    needs: setup
    if: ${{ needs.setup.outputs.has-consul-license == 'true' }}
    runs-on: ${{ fromJSON(needs.setup.outputs.compute-medium) }}
    continue-on-error: false
    env:
      CONSUL_NSPACES_ENABLED: 1
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4

      - name: Install PNPM
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false
          package_json_file: ui/package.json

      - name: Setup node and pnpm cache
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version-file: "./ui/package.json"
          cache: "pnpm"
          cache-dependency-path: "ui/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: ui
        run: make deps

      - name: Install Playwright browsers
        working-directory: ui/packages/consul-ui
        run: npx playwright install --with-deps chromium

      - name: Checkout consul-ui-testing repo
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
        with:
          repository: hashicorp/consul-ui-testing
          path: consul-ui-testing
          token: ${{ secrets.ELEVATED_GITHUB_TOKEN }}

      - name: Install consul-ui-testing dependencies
        working-directory: consul-ui-testing
        run: yarn install

      - name: Install httpie (required by consul-ui-testing)
        run: |
          sudo apt-get update
          sudo apt-get install -y httpie

      - name: Patch consul-ui-testing for CI runners
        working-directory: consul-ui-testing
        run: bash "$GITHUB_WORKSPACE/.github/scripts/patch_consul_ui_testing.sh"

      - name: Force HashiCups image rebuild
        working-directory: consul-ui-testing
        run: rm -f .last_consul_version_built

      - name: Start Consul API servers (ENT)
        working-directory: consul-ui-testing
        timeout-minutes: 2
        run: |
          echo "Starting Consul API servers at $(date '+%Y-%m-%d %H:%M:%S')"
          yarn start hashicorppreview/consul-enterprise:latest > consul-start.log 2>&1 &
          echo $! > consul-start.pid
          echo "consul-ui-testing start PID: $(cat consul-start.pid)"
          echo "Process table entry for startup command:"
          ps -fp "$(cat consul-start.pid)" || true
          sleep 10
          if ! kill -0 "$(cat consul-start.pid)" 2>/dev/null; then
            echo "::error::Consul startup process exited within the first 10 seconds"
            echo "--- consul-start.log ---"
            tail -n 200 consul-start.log || true
            echo "--- docker ps -a ---"
            docker ps -a || true
            exit 1
          fi
          echo "Startup process is still running after 10 seconds"
          echo "--- Initial consul-start.log (last 100 lines) ---"
          tail -n 100 consul-start.log || true
          echo "--- docker compose ps ---"
          docker compose ps || true
          echo "--- docker ps -a ---"
          docker ps -a || true
        env:
          CONSUL_LICENSE: ${{ secrets.CONSUL_LICENSE }}

      - name: Wait for Consul peering setup (ENT)
        working-directory: consul-ui-testing
        timeout-minutes: 6
        env:
          CONSUL_IMAGE: hashicorppreview/consul-enterprise:latest
          CONSUL_LICENSE: ${{ secrets.CONSUL_LICENSE }}
        run: |
          echo "Waiting up to 5 minutes for Consul peering setup..."
          last_log_line=0
          for i in $(seq 1 60); do
            current_log_line=$(wc -l < consul-start.log 2>/dev/null || echo 0)
            if [ "$current_log_line" -gt "$last_log_line" ]; then
              echo "--- New consul-start.log output (lines $((last_log_line + 1))-$current_log_line) ---"
              sed -n "$((last_log_line + 1)),$current_log_line p" consul-start.log || true
              last_log_line=$current_log_line
            fi

            if grep -q "We have successfully setup peering" consul-start.log 2>/dev/null; then
              echo "Consul peering is ready (after ~$((i * 5))s)"
              echo "--- docker compose ps at peering completion ---"
              docker compose ps || true
              exit 0
            fi

            if ! kill -0 "$(cat consul-start.pid)" 2>/dev/null; then
              echo "::error::Consul startup process exited before peering completed"
              echo "--- Last 300 lines of consul-start.log ---"
              tail -n 300 consul-start.log
              echo "--- docker compose ps ---"
              docker compose ps || true
              echo "--- docker ps -a ---"
              docker ps -a || true
              exit 1
            fi

            if (( i % 6 == 0 )); then
              echo "Still waiting... ($((i * 5))s elapsed)"
              echo "--- docker compose ps ---"
              docker compose ps || true
            fi
            sleep 5
          done

          echo "::error::Timed out waiting for Consul peering setup (300s)"
          echo "--- Last 300 lines of consul-start.log ---"
          tail -n 300 consul-start.log
          echo "--- docker compose ps ---"
          docker compose ps || true
          echo "--- docker ps -a ---"
          docker ps -a || true
          exit 1

      - name: Verify Consul API readiness (ENT)
        working-directory: consul-ui-testing
        timeout-minutes: 3
        env:
          CONSUL_IMAGE: hashicorppreview/consul-enterprise:latest
          CONSUL_LICENSE: ${{ secrets.CONSUL_LICENSE }}
        run: |
          echo "Verifying Consul API readiness before starting UI..."
          echo "--- docker compose ps ---"
          docker compose ps || true

          for i in $(seq 1 12); do
            primary_leader=$(curl -fsS http://localhost:8500/v1/status/leader || true)
            secondary_leader=$(curl -fsS http://localhost:8501/v1/status/leader || true)

            if [ -n "$primary_leader" ] && [ -n "$secondary_leader" ] && [ "$primary_leader" != '""' ] && [ "$secondary_leader" != '""' ]; then
              echo "Primary leader: $primary_leader"
              echo "Secondary leader: $secondary_leader"
              exit 0
            fi

            echo "Consul APIs not ready yet ($((i * 5))s elapsed)"
            echo "Primary leader response: ${primary_leader:-<empty>}"
            echo "Secondary leader response: ${secondary_leader:-<empty>}"
            sleep 5
          done

          echo "::error::Consul HTTP APIs did not become ready in time"
          echo "--- docker compose ps ---"
          docker compose ps || true
          echo "--- Last 200 lines of consul-start.log ---"
          tail -n 200 consul-start.log || true
          exit 1

      - name: Report HashiCups container states (ENT)
        working-directory: consul-ui-testing
        timeout-minutes: 2
        env:
          CONSUL_IMAGE: hashicorppreview/consul-enterprise:latest
          CONSUL_LICENSE: ${{ secrets.CONSUL_LICENSE }}
        run: |
          echo "Container states after Consul readiness:"
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'
          echo "Exited containers:"
          docker ps -a --filter status=exited --format '{{.Names}} {{.Status}}' || true
          for container in product-api public-api payments product-db product-api-secondary public-api-secondary payments-secondary product-db-secondary frontend frontend-secondary; do
            if docker ps -a --format '{{.Names}}' | grep -qx "$container"; then
