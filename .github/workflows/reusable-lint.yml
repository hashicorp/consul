name: reusable-lint

on:
  workflow_call:
    inputs:
      go-arch:
        required: false
        type: string
        default: ""
      go-version:
        required: true
        type: string
      runs-on:
        description: An expression indicating which kind of runners to use.
        required: true
        type: string
      repository-name:
        required: true
        type: string
    secrets:
      elevated-github-token:
        required: true
env:
  GOTAGS: "${{ github.event.repository.name == 'consul-enterprise' && 'consulent consuldev hashicorpmetrics' || 'hashicorpmetrics' }}"
  GOARCH: ${{inputs.go-arch}}
  GOPRIVATE: github.com/hashicorp # Required for enterprise deps

jobs:
  lint:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    strategy:
      matrix:
        directory: 
        - ""
        - "api"
        - "sdk"
        - "envoyextensions"
        - "troubleshoot"
        - "test/integration/consul-container"
        - "test-integ"
        - "testing/deployer"
      fail-fast: true
    name: lint ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # NOTE: This step is specifically needed for ENT. It allows us to access the required private HashiCorp repos.
      - name: Setup Git
        if: ${{ endsWith(inputs.repository-name, '-enterprise') }}
        run: git config --global url."https://${{ secrets.elevated-github-token }}:@github.com".insteadOf "https://github.com"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version }}
      - run: go env
      - name: Set golangci-lint version
        run: echo "GOLANGCI_LINT_VERSION=$(make --no-print-directory print-GOLANGCI_LINT_VERSION)" >> $GITHUB_ENV
      - name: lint-${{ matrix.directory }}
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          working-directory: ${{ matrix.directory }}
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --build-tags="${{ env.GOTAGS }}" -v
          skip-cache: true
